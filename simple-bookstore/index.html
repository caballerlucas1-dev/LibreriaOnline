<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreriaOnline</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>LibreriaOnline</h1>
            <div class="user-actions">
                <button id="loginBtn">Login</button>
                <button id="cartBtn" aria-label="Carrito de compras">
                    <span class="cart-icon">🛒</span>
                    <span id="cartCount" class="cart-badge">0</span>
                </button>
            </div>
        </header>

        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Iniciar sesión</button>
                    <button class="tab-btn" data-tab="register">Registrarse</button>
                </div>
                <form id="authForm">
                    <div id="login-panel" class="auth-panel active">
                        <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                        <input type="password" id="loginPassword" placeholder="Contraseña" required>
                        <button type="submit">Entrar</button>
                    </div>
                    <div id="register-panel" class="auth-panel">
                        <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
                        <input type="password" id="registerPassword" placeholder="Contraseña" required>
                        <input type="text" id="registerUsername" placeholder="Nombre de usuario" required>
                        <button type="submit">Registrarse</button>
                    </div>
                </form>
                <p id="authError" class="error"></p>
            </div>
        </div>

        <!-- Cart Modal -->
        <div id="cartModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Tu carrito</h2>
                <div id="cartItems"></div>
                <div class="cart-footer">
                    <p>Total: <span id="cartTotal">$0.00</span></p>
                    <button id="checkoutBtn">Proceder al pago</button>
                </div>
            </div>
        </div>

        <main>
            <section class="books-section">
                <h2>Libros destacados</h2>
                <div id="booksGrid" class="books-grid"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
