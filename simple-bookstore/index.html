<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibroLoco - Compra y Venta de Libros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cart Indicator -->
    <div class="cart-indicator" id="cartIndicator">0</div>

    <header>
        <div class="container">
            <h1>LibroLoco</h1>
            <p>Descubre, compra y vende libros increíbles</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="books-grid" id="booksGrid">
                <!-- Books will be injected here by JavaScript -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 LibroLoco. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="books.js"></script>
    <script src="script.js"></script>
</body>
</html>
